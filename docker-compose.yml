services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ai_repo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/ai_repo

  ai_suite:
    build: ./ai_suite
    volumes:
      - media_data:/app/media
      - ai_workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: model-sandbox
    command: ["/bin/true"]


volumes:
  postgres_data:
  media_data:
  ai_workspaces:
    name: ai_workspaces
services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ai_repo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/ai_repo

  ai_suite:
    build: ./ai_suite
    # Dockerfile should handle this cleaner
    # command: uvicorn main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./ai_suite:/app
      - media_data:/app/media_shared
      - ai_workspaces:/app/workspaces
      - /usr/local/lib/python3.11/site-packages
      - /usr/local/bin
    ports:
      - "8001:8001"

volumes:
  postgres_data:
  media_data:
  ai_workspaces: